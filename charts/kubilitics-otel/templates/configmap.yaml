apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubilitics-otel.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubilitics-otel.labels" . | nindent 4 }}
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 100
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.container.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resource:
        attributes:
          - key: kubilitics.cluster.id
            value: {{ .Values.kubilitics.clusterId | quote }}
            action: upsert

    exporters:
      otlphttp:
        endpoint: {{ .Values.kubilitics.backendUrl | quote }}
        # Kubilitics receiver expects JSON encoding (gzip is fine).
        encoding: json
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [k8sattributes, resource, batch]
          exporters: [otlphttp, debug]
