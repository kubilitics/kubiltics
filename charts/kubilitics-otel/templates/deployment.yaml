apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubilitics-otel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubilitics-otel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubilitics-otel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubilitics-otel.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a pod restart when the ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "kubilitics-otel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: otel-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --config=/conf/collector.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            - name: KUBILITICS_CLUSTER_ID
              value: {{ .Values.kubilitics.clusterId | quote }}
            - name: KUBILITICS_BACKEND_URL
              value: {{ .Values.kubilitics.backendUrl | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "kubilitics-otel.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
