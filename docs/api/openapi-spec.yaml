openapi: 3.0.3
info:
  title: Kubilitics API
  description: |
    REST API for Kubilitics — a production-grade Kubernetes management platform.

    ## Authentication

    All endpoints (except `/healthz/*`) require a valid JWT bearer token
    or API key. Obtain a token via `POST /api/v1/auth/login`.

    ## Rate Limiting

    API requests are rate-limited per authenticated user:
    - Default: 120 requests/minute
    - Topology generation: 10 requests/minute
    - WebSocket connections: 5 concurrent per user

    Rate limit headers are included in every response:
    - `X-RateLimit-Limit`
    - `X-RateLimit-Remaining`
    - `X-RateLimit-Reset`
  version: 0.1.1
  contact:
    name: Kubilitics Team
    url: https://github.com/kubilitics/kubilitics
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://kubilitics.example.com
    description: Production

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Auth
    description: Authentication and user management
  - name: Clusters
    description: Cluster registration and management
  - name: Topology
    description: Topology graph generation and export
  - name: Resources
    description: Kubernetes resource operations
  - name: Addons
    description: Add-on catalog and lifecycle management
  - name: Health
    description: Health and readiness probes

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate and obtain a JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/clusters:
    get:
      tags: [Clusters]
      operationId: listClusters
      summary: List all registered clusters
      parameters:
        - name: status
          in: query
          description: Filter by cluster status
          schema:
            type: string
            enum: [connected, disconnected, error]
      responses:
        '200':
          description: List of clusters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cluster'
    post:
      tags: [Clusters]
      operationId: registerCluster
      summary: Register a new cluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterClusterRequest'
      responses:
        '201':
          description: Cluster registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '400':
          description: Invalid request or cluster limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/clusters/{clusterId}:
    get:
      tags: [Clusters]
      operationId: getCluster
      summary: Get a cluster by ID
      parameters:
        - $ref: '#/components/parameters/ClusterId'
      responses:
        '200':
          description: Cluster details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
        '404':
          description: Cluster not found
    delete:
      tags: [Clusters]
      operationId: deleteCluster
      summary: Remove a registered cluster
      parameters:
        - $ref: '#/components/parameters/ClusterId'
      responses:
        '204':
          description: Cluster removed
        '404':
          description: Cluster not found

  /api/v1/clusters/{clusterId}/summary:
    get:
      tags: [Clusters]
      operationId: getClusterSummary
      summary: Get cluster summary with resource counts
      parameters:
        - $ref: '#/components/parameters/ClusterId'
      responses:
        '200':
          description: Cluster summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterSummary'

  /api/v1/clusters/{clusterId}/topology:
    get:
      tags: [Topology]
      operationId: getTopology
      summary: Generate the topology graph for a cluster
      description: |
        Returns the full resource relationship graph for the specified cluster
        and optional namespace. The response includes nodes (resources), edges
        (relationships), and graph metadata.

        Cached for 30 seconds by default (configurable via
        `KUBILITICS_TOPOLOGY_CACHE_TTL_SEC`). The graph is capped at 5000 nodes
        by default (`KUBILITICS_TOPOLOGY_MAX_NODES`).
      parameters:
        - $ref: '#/components/parameters/ClusterId'
        - name: namespace
          in: query
          description: Filter to a specific namespace (omit for all namespaces)
          schema:
            type: string
      responses:
        '200':
          description: Topology graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopologyGraph'

  /api/v1/clusters/{clusterId}/topology/export:
    post:
      tags: [Topology]
      operationId: exportTopology
      summary: Export topology as PNG, PDF, or SVG
      parameters:
        - $ref: '#/components/parameters/ClusterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Exported file
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary

  /api/v1/clusters/{clusterId}/resources/{kind}:
    get:
      tags: [Resources]
      operationId: listResources
      summary: List resources of a specific kind
      parameters:
        - $ref: '#/components/parameters/ClusterId'
        - name: kind
          in: path
          required: true
          schema:
            type: string
          description: 'Kubernetes resource kind (e.g., pods, deployments, services)'
        - name: namespace
          in: query
          schema:
            type: string
        - name: labelSelector
          in: query
          schema:
            type: string
          description: 'Kubernetes label selector (e.g., app=nginx)'
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KubernetesResource'

  /api/v1/clusters/{clusterId}/addons/catalog:
    get:
      tags: [Addons]
      operationId: listAddonCatalog
      summary: List available add-ons from the catalog
      parameters:
        - $ref: '#/components/parameters/ClusterId'
        - name: category
          in: query
          schema:
            type: string
            enum: [monitoring, logging, networking, security, storage, ingress]
      responses:
        '200':
          description: Add-on catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddonCatalogEntry'

  /api/v1/clusters/{clusterId}/addons/installed:
    get:
      tags: [Addons]
      operationId: listInstalledAddons
      summary: List add-ons installed on a cluster
      parameters:
        - $ref: '#/components/parameters/ClusterId'
      responses:
        '200':
          description: Installed add-ons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstalledAddon'

  /api/v1/clusters/{clusterId}/addons/{addonId}/install:
    post:
      tags: [Addons]
      operationId: installAddon
      summary: Install an add-on on a cluster
      parameters:
        - $ref: '#/components/parameters/ClusterId'
        - name: addonId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddonInstallRequest'
      responses:
        '202':
          description: Installation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstalledAddon'

  /healthz/live:
    get:
      tags: [Health]
      operationId: healthLive
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /healthz/ready:
    get:
      tags: [Health]
      operationId: healthReady
      summary: Readiness probe
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT obtained from POST /api/v1/auth/login
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key from user settings

  parameters:
    ClusterId:
      name: clusterId
      in: path
      required: true
      description: Cluster unique identifier
      schema:
        type: string
        format: uuid

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: changeme
        mfaCode:
          type: string
          description: TOTP code (if MFA is enabled)
          example: '123456'

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        expiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
          description: Refresh token for obtaining new access tokens
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, editor, viewer]

    Cluster:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: production-us-east
        status:
          type: string
          enum: [connected, disconnected, error]
        kubernetesVersion:
          type: string
          example: v1.31.2
        nodeCount:
          type: integer
        podCount:
          type: integer
        namespaces:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterClusterRequest:
      type: object
      required: [name, kubeconfig]
      properties:
        name:
          type: string
          description: Human-readable cluster name
          example: production-us-east
        kubeconfig:
          type: string
          description: Base64-encoded kubeconfig content
        context:
          type: string
          description: Kubeconfig context to use (default uses current-context)

    ClusterSummary:
      type: object
      properties:
        clusterId:
          type: string
          format: uuid
        nodeCount:
          type: integer
        podCount:
          type: integer
        deploymentCount:
          type: integer
        serviceCount:
          type: integer
        namespaceCount:
          type: integer
        cpuCapacity:
          type: string
          example: '16000m'
        memoryCapacity:
          type: string
          example: '64Gi'
        cpuUsage:
          type: string
          example: '4200m'
        memoryUsage:
          type: string
          example: '28Gi'

    TopologyGraph:
      type: object
      properties:
        schemaVersion:
          type: string
          example: '1.0'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TopologyNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'
        metadata:
          $ref: '#/components/schemas/TopologyMetadata'

    TopologyNode:
      type: object
      required: [id, kind, name]
      properties:
        id:
          type: string
          description: 'Unique node ID (e.g., Pod/default/nginx-abc123)'
          example: Pod/default/nginx-abc123
        kind:
          type: string
          description: Kubernetes resource kind
          example: Pod
        namespace:
          type: string
          example: default
        name:
          type: string
          example: nginx-abc123
        apiVersion:
          type: string
          example: v1
        metadata:
          type: object
          properties:
            uid:
              type: string
            createdAt:
              type: string
              format: date-time
            labels:
              type: object
              additionalProperties:
                type: string
            annotations:
              type: object
              additionalProperties:
                type: string
        computed:
          type: object
          properties:
            health:
              type: string
              enum: [healthy, warning, error, unknown]
            restartCount:
              type: integer
            replicas:
              type: object
              properties:
                desired:
                  type: integer
                ready:
                  type: integer
                available:
                  type: integer
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number

    TopologyEdge:
      type: object
      required: [id, source, target, relationshipType]
      properties:
        id:
          type: string
        source:
          type: string
          description: Source node ID
        target:
          type: string
          description: Target node ID
        relationshipType:
          type: string
          enum: [owns, selects, mounts, routes, schedules, contains, binds, references]
          description: Canonical relationship type
        label:
          type: string
        metadata:
          type: object
          properties:
            derivation:
              type: string
              description: How the relationship was discovered
            confidence:
              type: number
              format: float
            sourceField:
              type: string

    TopologyMetadata:
      type: object
      properties:
        clusterId:
          type: string
          format: uuid
        generatedAt:
          type: string
          format: date-time
        layoutSeed:
          type: string
        isComplete:
          type: boolean
        warnings:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              affectedNodes:
                type: array
                items:
                  type: string

    ExportRequest:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [png, pdf, svg]
        namespace:
          type: string
        width:
          type: integer
          default: 1920
        height:
          type: integer
          default: 1080
        darkMode:
          type: boolean
          default: false

    KubernetesResource:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          type: object
          properties:
            name:
              type: string
            namespace:
              type: string
            uid:
              type: string
            createdAt:
              type: string
              format: date-time
            labels:
              type: object
              additionalProperties:
                type: string
        spec:
          type: object
          description: Resource spec (varies by kind)
        status:
          type: object
          description: Resource status (varies by kind)

    AddonCatalogEntry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: metrics-server
        displayName:
          type: string
          example: Metrics Server
        description:
          type: string
        category:
          type: string
          enum: [monitoring, logging, networking, security, storage, ingress]
        chartRepository:
          type: string
        chartName:
          type: string
        defaultVersion:
          type: string
          example: 3.12.0
        icon:
          type: string
          format: uri

    InstalledAddon:
      type: object
      properties:
        id:
          type: string
        addonId:
          type: string
        clusterId:
          type: string
          format: uuid
        status:
          type: string
          enum: [installing, installed, failed, uninstalling]
        version:
          type: string
        namespace:
          type: string
        installedAt:
          type: string
          format: date-time
        values:
          type: object
          description: Helm values used for installation

    AddonInstallRequest:
      type: object
      properties:
        version:
          type: string
          description: Chart version (default is latest)
        namespace:
          type: string
          description: Target namespace
          default: default
        values:
          type: object
          description: Helm values override

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, unhealthy]
        reason:
          type: string
        error:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Machine-readable error code
        details:
          type: object
          description: Additional error context
