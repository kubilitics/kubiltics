# ClusterRole gives the collector read access to the resources the
# k8sattributes processor needs to enrich spans with k8s metadata.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubilitics-otel.fullname" . }}
  labels:
    {{- include "kubilitics-otel.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - pods
      - replicationcontrollers
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources:
      - replicasets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubilitics-otel.fullname" . }}
  labels:
    {{- include "kubilitics-otel.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubilitics-otel.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubilitics-otel.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
