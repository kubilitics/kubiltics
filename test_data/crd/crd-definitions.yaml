apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apiregistries.kubilitics.com
  labels:
    app.kubernetes.io/part-of: kubilitics-demo
spec:
  group: kubilitics.com
  scope: Namespaced
  names:
    plural: apiregistries
    singular: apiregistry
    kind: APIRegistry
    shortNames:
      - apireg
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                ownerTeam:
                  type: string
                priority:
                  type: string
                  enum: ["low", "normal", "high"]
                status:
                  type: string
                  enum: ["draft", "active", "deprecated"]
                endpoints:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      path:
                        type: string
                      method:
                        type: string
      additionalPrinterColumns:
        - name: Owner
          type: string
          jsonPath: .spec.ownerTeam
        - name: Priority
          type: string
          jsonPath: .spec.priority
        - name: Status
          type: string
          jsonPath: .spec.status
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertpolicies.kubilitics.com
  labels:
    app.kubernetes.io/part-of: kubilitics-demo
spec:
  group: kubilitics.com
  scope: Namespaced
  names:
    plural: alertpolicies
    singular: alertpolicy
    kind: AlertPolicy
    shortNames:
      - apol
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                severity:
                  type: string
                  enum: ["info", "warning", "critical"]
                window:
                  type: string
                metric:
                  type: string
                threshold:
                  type: number
                enabled:
                  type: boolean
      additionalPrinterColumns:
        - name: Severity
          type: string
          jsonPath: .spec.severity
        - name: Metric
          type: string
          jsonPath: .spec.metric
        - name: Enabled
          type: string
          jsonPath: .spec.enabled
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: datasources.kubilitics.com
  labels:
    app.kubernetes.io/part-of: kubilitics-demo
spec:
  group: kubilitics.com
  scope: Namespaced
  names:
    plural: datasources
    singular: datasource
    kind: DataSource
    shortNames:
      - dsrc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                type:
                  type: string
                  enum: ["postgres", "mongo", "kafka", "s3"]
                endpoint:
                  type: string
                status:
                  type: string
                  enum: ["connected", "degraded", "disconnected"]
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Status
          type: string
          jsonPath: .spec.status

