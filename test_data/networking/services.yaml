# Kubilitics Demo Services — 10 services across namespaces
apiVersion: v1
kind: Service
metadata:
  name: web-gateway
  namespace: kubilitics-demo
  labels: { app: web-gateway, tier: frontend, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  type: LoadBalancer
  selector: { app: web-gateway }
  ports: [{ name: http, port: 80, targetPort: 80 }, { name: https, port: 443, targetPort: 443 }]
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: kubilitics-demo
  labels: { app: api-server, tier: backend, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: api-server }
  ports: [{ name: http, port: 5678, targetPort: 5678 }]
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kubilitics-demo
  labels: { app: auth-service, tier: backend, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: auth-service }
  ports: [{ name: http, port: 5678, targetPort: 5678 }]
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: kubilitics-demo
  labels: { app: notification-service, tier: backend, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: notification-service }
  ports: [{ name: grpc, port: 9090, targetPort: 9090 }]
---
apiVersion: v1
kind: Service
metadata:
  name: product-catalog
  namespace: ecommerce-prod
  labels: { app: product-catalog, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: product-catalog }
  ports: [{ name: http, port: 80, targetPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: shopping-cart
  namespace: ecommerce-prod
  labels: { app: shopping-cart, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: shopping-cart }
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: ecommerce-prod
  labels: { app: checkout-service, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  type: NodePort
  selector: { app: checkout-service }
  ports: [{ name: http, port: 5678, targetPort: 5678, nodePort: 30080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: data-collector
  namespace: analytics-staging
  labels: { app: data-collector, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: data-collector }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-ui
  namespace: analytics-staging
  labels: { app: dashboard-ui, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: dashboard-ui }
  ports: [{ name: http, port: 80, targetPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: payment-processor
  namespace: payments-prod
  labels: { app: payment-processor, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { app: payment-processor }
  ports: [{ name: http, port: 5678, targetPort: 5678 }, { name: grpc, port: 9090, targetPort: 9090 }]
