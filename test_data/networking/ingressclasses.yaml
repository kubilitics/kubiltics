# Kubilitics Demo IngressClasses — 3 classes (cluster-scoped)
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx-external
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
  annotations: { ingressclass.kubernetes.io/is-default-class: "true" }
spec:
  controller: k8s.io/ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx-internal
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  controller: k8s.io/ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik-mesh
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  controller: traefik.io/ingress-controller
