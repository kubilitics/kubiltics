# Kubilitics Demo NetworkPolicies — 5 policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-default
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-api
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  podSelector: { matchLabels: { tier: backend } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { tier: frontend } }
      ports: [{ protocol: TCP, port: 5678 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-db
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  podSelector: { matchLabels: { tier: database } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { tier: backend } }
      ports: [{ protocol: TCP, port: 5432 }, { protocol: TCP, port: 6379 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ecommerce-isolation
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { team: ecommerce } }
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payments-strict-isolation
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { team: fintech } }
      ports: [{ protocol: TCP, port: 5678 }]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { team: fintech } }
    - ports: [{ protocol: TCP, port: 443 }]
