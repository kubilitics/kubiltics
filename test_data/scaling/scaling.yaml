# Kubilitics Demo Scaling — HPAs, PDBs, ResourceQuotas, LimitRanges
# HorizontalPodAutoscalers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-gateway-hpa
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: web-gateway }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-server-hpa
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-server }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-catalog-hpa
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: product-catalog }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 50 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-processor-hpa
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: payment-processor }
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 40 } }
---
# PodDisruptionBudgets
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-gateway-pdb
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: web-gateway } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-server-pdb
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  maxUnavailable: 1
  selector: { matchLabels: { app: api-server } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-cluster-pdb
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: redis-cluster } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-processor-pdb
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  minAvailable: 2
  selector: { matchLabels: { app: payment-processor } }
---
# ResourceQuotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  hard:
    requests.cpu: "12"
    requests.memory: 24Gi
    limits.cpu: "24"
    limits.memory: 48Gi
    pods: "80"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: ml-pipeline
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 64Gi
    limits.cpu: "32"
    limits.memory: 128Gi
    pods: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "40"
---
# LimitRanges
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  limits:
    - type: Container
      default: { cpu: 250m, memory: 256Mi }
      defaultRequest: { cpu: 100m, memory: 128Mi }
      max: { cpu: "2", memory: 4Gi }
      min: { cpu: 25m, memory: 32Mi }
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  limits:
    - type: Container
      default: { cpu: 500m, memory: 512Mi }
      defaultRequest: { cpu: 200m, memory: 256Mi }
      max: { cpu: "4", memory: 8Gi }
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  limits:
    - type: Container
      default: { cpu: 500m, memory: 512Mi }
      defaultRequest: { cpu: 200m, memory: 256Mi }
      max: { cpu: "2", memory: 4Gi }
      min: { cpu: 50m, memory: 64Mi }
