# Kubilitics Demo ConfigMaps — 6 config maps
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  MAX_CONNECTIONS: "100"
  CACHE_TTL: "300"
  FEATURE_FLAGS: '{"dark_mode":true,"beta_api":false,"new_dashboard":true}'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      upstream api { server api-server:5678; }
      server {
        listen 80;
        location / { proxy_pass http://api; }
        location /health { return 200 'ok'; }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-settings
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
data:
  ITEMS_PER_PAGE: "24"
  SEARCH_ENGINE: "elasticsearch"
  CDN_URL: "https://cdn.example.com"
  CURRENCY: "USD"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
  namespace: analytics-staging
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
data:
  BATCH_SIZE: "1000"
  OUTPUT_FORMAT: "parquet"
  RETENTION_DAYS: "90"
  WAREHOUSE_URL: "warehouse.analytics.internal:5439"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-hyperparams
  namespace: ml-pipeline
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
data:
  LEARNING_RATE: "0.001"
  EPOCHS: "50"
  BATCH_SIZE: "32"
  OPTIMIZER: "adam"
  DROPOUT: "0.3"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-gateway-config
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
data:
  GATEWAY_URL: "https://gateway.stripe.example.com"
  RETRY_COUNT: "3"
  TIMEOUT_MS: "5000"
  SUPPORTED_CURRENCIES: "USD,EUR,GBP,JPY"
