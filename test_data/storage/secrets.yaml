# Kubilitics Demo Secrets — 5 secrets (using Opaque type with dummy data)
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
type: Opaque
stringData:
  DB_HOST: "postgres-primary-0.postgres-primary"
  DB_PORT: "5432"
  DB_USER: "kubilitics_app"
  DB_PASSWORD: "demo-password-not-real"
  DB_NAME: "kubilitics"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
type: Opaque
stringData:
  JWT_SECRET: "demo-jwt-secret-256bit"
  API_KEY: "demo-api-key-for-external-service"
  WEBHOOK_SECRET: "demo-webhook-signing-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certs
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
type: kubernetes.io/tls
stringData:
  tls.crt: "-----BEGIN CERTIFICATE-----\nDEMO_CERT_NOT_REAL\n-----END CERTIFICATE-----"
  tls.key: "-----BEGIN PRIVATE KEY-----\nDEMO_KEY_NOT_REAL\n-----END PRIVATE KEY-----"
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
type: Opaque
stringData:
  MONGO_URI: "mongodb://mongo-replica-0.mongo-replica:27017"
  MONGO_USER: "ecommerce_app"
  MONGO_PASSWORD: "demo-mongo-pass"
---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-keys
  namespace: payments-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
type: Opaque
stringData:
  STRIPE_PUBLIC_KEY: "pk_test_demo_not_real"
  STRIPE_SECRET_KEY: "sk_test_demo_not_real"
  STRIPE_WEBHOOK_SECRET: "whsec_demo_not_real"
