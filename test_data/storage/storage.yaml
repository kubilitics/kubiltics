# Kubilitics Demo Storage — StorageClasses + PVs + PVCs
# StorageClasses (cluster-scoped)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-hdd
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
reclaimPolicy: Delete
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: replicated-nvme
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
# PersistentVolumes (cluster-scoped)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-postgres-data-01
  labels: { type: local, tier: database, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  capacity: { storage: 20Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath: { path: /tmp/kubilitics-demo/pv-postgres-01 }
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-redis-data-01
  labels: { type: local, tier: cache, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  capacity: { storage: 5Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath: { path: /tmp/kubilitics-demo/pv-redis-01 }
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-logs-archive-01
  labels: { type: local, tier: logging, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  capacity: { storage: 50Gi }
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Delete
  storageClassName: standard-hdd
  hostPath: { path: /tmp/kubilitics-demo/pv-logs-01 }
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-ml-models-01
  labels: { type: local, tier: ml, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  capacity: { storage: 100Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: replicated-nvme
  hostPath: { path: /tmp/kubilitics-demo/pv-models-01 }
---
# PersistentVolumeClaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: fast-ssd
  resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: fast-ssd
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-logs
  namespace: kubilitics-demo
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  accessModes: [ReadWriteMany]
  storageClassName: standard-hdd
  resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: ecommerce-prod
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: fast-ssd
  resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-model-storage
  namespace: ml-pipeline
  labels: { app.kubernetes.io/part-of: kubilitics-demo }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: replicated-nvme
  resources: { requests: { storage: 50Gi } }
