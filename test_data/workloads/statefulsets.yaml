# Kubilitics Demo StatefulSets — 5 stateful apps with headless services
# Headless services required by StatefulSets
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: kubilitics-demo
  labels: { app: postgres-primary, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  clusterIP: None
  selector: { app: postgres-primary }
  ports: [{ port: 5432, name: postgres }]
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: kubilitics-demo
  labels: { app: redis-cluster, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  clusterIP: None
  selector: { app: redis-cluster }
  ports: [{ port: 6379, name: redis }]
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-broker
  namespace: analytics-staging
  labels: { app: kafka-broker, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  clusterIP: None
  selector: { app: kafka-broker }
  ports: [{ port: 9092, name: kafka }]
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-replica
  namespace: ecommerce-prod
  labels: { app: mongo-replica, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  clusterIP: None
  selector: { app: mongo-replica }
  ports: [{ port: 27017, name: mongo }]
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-cluster
  namespace: payments-prod
  labels: { app: etcd-cluster, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  clusterIP: None
  selector: { app: etcd-cluster }
  ports: [{ port: 2379, name: client }, { port: 2380, name: peer }]
---
# StatefulSets
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: kubilitics-demo
  labels: { app: postgres-primary, tier: database, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  serviceName: postgres-primary
  replicas: 2
  selector: { matchLabels: { app: postgres-primary } }
  template:
    metadata: { labels: { app: postgres-primary, tier: database, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: db
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: kubilitics-demo
  labels: { app: redis-cluster, tier: cache, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  serviceName: redis-cluster
  replicas: 3
  selector: { matchLabels: { app: redis-cluster } }
  template:
    metadata: { labels: { app: redis-cluster, tier: cache, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 250m, memory: 256Mi } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-broker
  namespace: analytics-staging
  labels: { app: kafka-broker, tier: messaging, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  serviceName: kafka-broker
  replicas: 3
  selector: { matchLabels: { app: kafka-broker } }
  template:
    metadata: { labels: { app: kafka-broker, tier: messaging, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: kafka
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo 'kafka-broker'; sleep 30; done"]
          resources: { requests: { cpu: 200m, memory: 512Mi }, limits: { cpu: 1, memory: 1Gi } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-replica
  namespace: ecommerce-prod
  labels: { app: mongo-replica, tier: database, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  serviceName: mongo-replica
  replicas: 3
  selector: { matchLabels: { app: mongo-replica } }
  template:
    metadata: { labels: { app: mongo-replica, tier: database, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: mongo
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo 'mongo-ready'; sleep 30; done"]
          resources: { requests: { cpu: 300m, memory: 512Mi }, limits: { cpu: 1, memory: 1Gi } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd-cluster
  namespace: payments-prod
  labels: { app: etcd-cluster, tier: database, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  serviceName: etcd-cluster
  replicas: 3
  selector: { matchLabels: { app: etcd-cluster } }
  template:
    metadata: { labels: { app: etcd-cluster, tier: database, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: etcd
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo 'etcd-ready'; sleep 30; done"]
          resources: { requests: { cpu: 200m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
