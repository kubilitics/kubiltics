# Kubilitics Demo DaemonSets — 3 node-level agents
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-log-collector
  namespace: kubilitics-demo
  labels: { app: node-log-collector, tier: observability, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { matchLabels: { app: node-log-collector } }
  template:
    metadata: { labels: { app: node-log-collector, tier: observability, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: logger
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo 'collecting node logs'; sleep 30; done"]
          resources: { requests: { cpu: 50m, memory: 64Mi }, limits: { cpu: 100m, memory: 128Mi } }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-metrics-exporter
  namespace: kubilitics-demo
  labels: { app: node-metrics-exporter, tier: observability, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { matchLabels: { app: node-metrics-exporter } }
  template:
    metadata: { labels: { app: node-metrics-exporter, tier: observability, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: exporter
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo 'node metrics'; sleep 15; done"]
          resources: { requests: { cpu: 50m, memory: 32Mi }, limits: { cpu: 100m, memory: 64Mi } }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: security-agent
  namespace: kubilitics-demo
  labels: { app: security-agent, tier: security, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  selector: { matchLabels: { app: security-agent } }
  template:
    metadata: { labels: { app: security-agent, tier: security, app.kubernetes.io/part-of: kubilitics-demo } }
    spec:
      containers:
        - name: agent
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo 'scanning'; sleep 60; done"]
          resources: { requests: { cpu: 25m, memory: 32Mi }, limits: { cpu: 50m, memory: 64Mi } }
