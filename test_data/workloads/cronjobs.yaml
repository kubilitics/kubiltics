# Kubilitics Demo CronJobs — 6 scheduled jobs
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-db-backup
  namespace: kubilitics-demo
  labels: { app: db-backup, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: busybox:1.36
              command: ["sh", "-c", "echo 'Backing up database'; sleep 5; echo 'Backup complete'"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-rotation
  namespace: kubilitics-demo
  labels: { app: log-rotation, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  schedule: "0 4 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rotate
              image: busybox:1.36
              command: ["sh", "-c", "echo 'Rotating logs'; sleep 3; echo 'Done'"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-check-sweep
  namespace: kubilitics-demo
  labels: { app: health-check, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  schedule: "*/10 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: health
              image: busybox:1.36
              command: ["sh", "-c", "echo 'Health check'; sleep 2"]
---
