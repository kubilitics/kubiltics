# Kubilitics Demo Jobs — 8 batch jobs across namespaces
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-v42
  namespace: kubilitics-demo
  labels: { app: db-migration, version: v42, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Running migration v42'; sleep 5; echo 'Migration complete'"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: data-seed
  namespace: kubilitics-demo
  labels: { app: data-seed, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Seeding data'; sleep 8; echo 'Seed complete'"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: report-generator
  namespace: analytics-staging
  labels: { app: report-generator, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: report
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Generating quarterly report'; sleep 10; echo 'Done'"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: etl-pipeline-run
  namespace: analytics-staging
  labels: { app: etl-pipeline, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  parallelism: 3
  completions: 3
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: etl
          image: busybox:1.36
          command: ["sh", "-c", "echo 'ETL processing batch'; sleep 6; echo 'Batch done'"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-index-rebuild
  namespace: ecommerce-prod
  labels: { app: catalog-index, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: indexer
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Rebuilding search index'; sleep 12; echo 'Index ready'"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: order-reconciliation
  namespace: ecommerce-prod
  labels: { app: order-reconciliation, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reconcile
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Reconciling orders'; sleep 4; echo 'Reconciled'"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-training-v8
  namespace: ml-pipeline
  labels: { app: model-training, version: v8, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Training model v8'; sleep 15; echo 'Training complete'"]
          resources: { requests: { cpu: 500m, memory: 1Gi }, limits: { cpu: 2, memory: 4Gi } }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: compliance-audit
  namespace: payments-prod
  labels: { app: compliance-audit, app.kubernetes.io/part-of: kubilitics-demo }
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: audit
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Running PCI compliance audit'; sleep 7; echo 'Audit passed'"]
