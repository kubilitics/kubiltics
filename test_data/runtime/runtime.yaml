apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor-sandbox
  labels:
    app.kubernetes.io/part-of: kubilitics-demo
handler: gvisor
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: high-performance
  labels:
    app.kubernetes.io/part-of: kubilitics-demo
handler: runc
overhead:
  podFixed:
    cpu: "50m"
    memory: "64Mi"
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gpu-accelerated
  labels:
    app.kubernetes.io/part-of: kubilitics-demo
handler: nvidia
Scheduling:
  nodeSelector:
    kubernetes.io/hostname: demo-gpu-node

